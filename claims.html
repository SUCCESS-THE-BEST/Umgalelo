<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Claim</title>
    <link rel="stylesheet" href="styleclaims.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-container">

    <!-- CLOSE BUTTON -->
    <div class="x-btn">
        <button type="button" id="x-button">X</button>
    </div>

    <form action="#" method="POST">

        <h1>Submit a Claim</h1>

        <!-- MEMBER SECTION -->
        <div class="form-section">

            <div class="form-group">
                <label for="member-name">Member</label>
                <input type="text" id="member-name" name="memberName" placeholder="Fullname" required>
            </div>

            <div class="form-group">
                <label for="society">Society</label>
                <select id="society" name="society" required>
                    <option value="">Select Society</option>
                    <option>Society 1</option>
                    <option>Society 2</option>
                    <option>Society 3</option>
                    <option>Society 4</option>
                </select>
            </div>

        </div>

        <!-- CLAIM SECTION -->
        <div class="form-section">

            <!-- ROW 1: Deceased + Amount -->
            <div class="form-row">

                <div class="form-group">
                    <label for="deceased">Full Name of Deceased</label>
                    <input type="text" id="deceased" name="deceasedName" placeholder="Fullname" required>
                </div>

                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="text" id="amount" name="amount" placeholder="R0.00" required>
                </div>

            </div>

            <!-- ROW 2: Relationship + Date -->
            <div class="form-row">

                <div class="form-group">
                    <label for="relationship">Relationship To You</label>
                    <select id="relationship" name="relationship" required>
                        <option>Mother</option>
                        <option>Father</option>
                        <option>Brother</option>
                        <option>Sister</option>
                        <option>Grandmother</option>
                        <option>Grandfather</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date of Passing</label>
                    <input type="text" id="date" name="dateOfPassing" placeholder="dd/mm/yyyy" required>
                </div>

            </div>

            <!-- UPLOAD SECTION -->
            <div class="form-group">
                <label>Upload Death Certificate</label>

                <div class="upload-section">
                    <p>Drag & Drop File</p>
                    <p>OR</p>
                    <input type="file" id="fileUpload">
                    <button type="button">Choose File</button>
                </div>
            </div>

        </div>

        <!-- BUTTONS -->
        <div class="buttons">
            <button type="button" class="cancel-btn">Cancel</button>
            <button type="submit" class="confirm-btn">Confirm Payment</button>
        </div>

    </form>

</div>

</body>
</html>
