<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login</title>
</head>
<body>
    <div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <div class="overlay">

      <div class="back">
        <span>←</span> Back to home
      </div>

      <img src="images/Umga.png" class="logo">

      <div class="left-text">
        <h2>Nice to see you<br>again</h2>
        <p>Access your society records and<br>continue where you left off.</p>

        <div class="signup">
          New to Umgalelo?
          <button ><a href="signup.html"> Signup </a></button> 
        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <form class="form">

      <div class="field">
        <label>Email Address</label><br>
        <input type="email" placeholder="example @test.com">
      </div>

      <div class="field">
        <label>Password</label><br>
        <div class="password-box">
          <input type="password" placeholder="Enter your password">
          <span class="eye">👁</span>
          
        </div>
        <a href="#" class="forgot">Forgot your password?</a>
      </div>

      <div class="row small">
        <label class="remember">
          <input type="checkbox"> Remember Me
        </label>
        
      </div>

      <button class="btn primary">Log In</button>

      <div class="divider">
        <span></span>
        OR
        <span></span>
      </div>

      <button class="btn secondary">Log in with demo account</button>

      <p class="demo">
        Demo: sipho@admin.com / Demo1234!<br>
        Member Demo: sipho@member.com / Demo1234!
      </p>

    </form>
  </div>

</div>
</body>
</html>
