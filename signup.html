<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <div class="overlay">
      <div class="back">
  <a href="#"><span class="arrow">←</span> Back to home</a>
</div>
      <img src="images/Umga.png" class="imgLogo">

      <div class="left-text">
        <h2>Get started with<br>your account</h2>
        <p>Connect, contribute, and grow<br>with Umgalelo</p>

        <div class="login">
          Already signed up?
          <button><a href="login.html"> LogIn </a></button>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <form>

      <h3>Personal Information</h3>

<div class="row">

        <div class="field">
        <label>First Name</label>
        <input type="text" placeholder="enter your first name">
        </div>

      <div class="field">
        <label>Last Name</label>
        <input type="text" placeholder="enter your last name">
      </div>

</div>

      <div class="row">
        <div class="field">
        <label>Are you South African</label>
        <input type="text" placeholder="YES">
        </div>
        <div class="field">
        <label>South African ID Number</label>
        <input type="text" placeholder="10-digit ID number">
        </div>
      </div>

      <h3>Contact Details</h3>

      <div class="row">
        <div class="field">
        <label>Email Address</label>
        <input type="email" placeholder="example@test.com">
        </div>
        <div class="field">
        <label for="phone">Phone Number</label>
        <input type="text" placeholder="+27">
        </div>
      </div>

      <h3>Secure Your Account</h3>

      <div class="row">
        <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
        </div>
        <div class="field">
        <label for="confirm password">Confirm Password</label>
        <input type="password" placeholder="Confirm password">
        </div>
      </div>

      <!-- PASSWORD STRENGTH -->
      <div class="strength">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>

      <div class="terms">
        <div></div>
         <p><input type="checkbox" class="checkbox"><div>
          I agree to the <span class="tnc">Terms and Conditions</span> and <span class="tnc"> Privacy Policy.</span>
          I confirm that the information provided is acuurate and true</div>
      </div>

      <button type="submit" class="submit">Create Account</button>

    </form>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
