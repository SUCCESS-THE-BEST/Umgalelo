<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Umgalelo</title>
    <link rel="stylesheet" href="/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=DM+Sans:wght@400;600;700&family=Padauk:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <!-- Left Side - Background Image with Text -->
        <div class="left-panel">
            <img src='/images/holding hands.jpg' alt="Background" class="background-image" />
            <div class="welcome-content">
                <div class="back-link" onclick="window.location.href='landingPage.html'">← Back to home</div>
                <div class="logo">
                    <img src="/images/umgalelo.png" alt="Logo">
                </div>
                <h1 class="welcome-heading">Nice to see you again</h1>
                <p class="welcome-text">Access your society records and continue where you left off.</p>
                <div class="signup-section">
                    <span class="signup-text">New to Umgalelo?</span>
                    <button class="signup-button" onclick="window.location.href='registration.html'">Sign Up</button>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="form-section">
            <form class="login-form">
                <h2 class="form-title">Enter Your Credentials</h2>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example @test.com">
                    <p id="email-error" style="padding: 5px;"></p>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password">
                        <p id="password-error" style="padding: 5px;"></p>
                        <!-- <img src="images/visible (1).png" alt="Show password" class="eye-icon"> -->
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember Me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot your password?</a>
                </div>

                <button class="login-button" id="login">Log In</button>

                <div class="divider">
                    <hr>
                    <span>OR</span>
                    <hr>
                </div>

                <button class="demo-button" id="demo">Log in with demo account</button>

                <div class="demo-info">
                    <p>Demo: sindi@admin.com / Demo1234!</p>
                    <p>Member Demo: sindi@member.com / Demo1234!</p>
                </div>
            </form>
        </div>
    </div>

    <script src="/scripts/login.js"></script>
</body>
</html>
